<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Smartphone -->
  <rect x="120" y="60" width="160" height="280" rx="20" fill="white" stroke="#10b981" stroke-width="3"/>
  <rect x="120" y="60" width="160" height="40" rx="20" fill="#10b981" fill-opacity="0.1"/>
  <circle cx="200" cy="320" r="12" fill="#10b981" fill-opacity="0.2"/>

  <!-- App interface -->
  <rect x="140" y="120" width="120" height="60" rx="8" fill="#10b981" fill-opacity="0.15"/>
  <rect x="150" y="130" width="40" height="40" rx="8" fill="#06b6d4" fill-opacity="0.2"/>
  <rect x="200" y="135" width="50" height="8" rx="4" fill="#10b981" fill-opacity="0.3"/>
  <rect x="200" y="150" width="40" height="6" rx="3" fill="#10b981" fill-opacity="0.2"/>

  <!-- App icons grid -->
  <circle cx="150" cy="210" r="15" fill="#10b981" fill-opacity="0.2"/>
  <circle cx="200" cy="210" r="15" fill="#06b6d4" fill-opacity="0.2"/>
  <circle cx="250" cy="210" r="15" fill="#10b981" fill-opacity="0.15"/>
  <circle cx="150" cy="260" r="15" fill="#06b6d4" fill-opacity="0.15"/>
  <circle cx="200" cy="260" r="15" fill="#10b981" fill-opacity="0.25"/>
  <circle cx="250" cy="260" r="15" fill="#06b6d4" fill-opacity="0.2"/>

  <!-- Code brackets decoration -->
  <text x="80" y="200" font-size="48" fill="#10b981" opacity="0.15">&lt;</text>
  <text x="300" y="200" font-size="48" fill="#10b981" opacity="0.15">&gt;</text>

  <!-- Floating notification -->
  <circle cx="310" cy="120" r="30" fill="#10b981" fill-opacity="0.1"/>
  <circle cx="310" cy="120" r="8" fill="#10b981"/>
</svg>
