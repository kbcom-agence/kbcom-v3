<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser window -->
  <rect x="40" y="80" width="320" height="240" rx="12" fill="white" stroke="#3b82f6" stroke-width="3"/>

  <!-- Browser header -->
  <rect x="40" y="80" width="320" height="40" rx="12" fill="#3b82f6" fill-opacity="0.1"/>
  <circle cx="65" cy="100" r="5" fill="#3b82f6" fill-opacity="0.4"/>
  <circle cx="85" cy="100" r="5" fill="#3b82f6" fill-opacity="0.4"/>
  <circle cx="105" cy="100" r="5" fill="#3b82f6" fill-opacity="0.4"/>

  <!-- Content blocks -->
  <rect x="60" y="140" width="280" height="12" rx="6" fill="#3b82f6" fill-opacity="0.2"/>
  <rect x="60" y="165" width="200" height="8" rx="4" fill="#3b82f6" fill-opacity="0.15"/>
  <rect x="60" y="180" width="240" height="8" rx="4" fill="#3b82f6" fill-opacity="0.15"/>

  <!-- Image placeholder -->
  <rect x="60" y="205" width="120" height="90" rx="8" fill="#3b82f6" fill-opacity="0.1"/>
  <rect x="195" y="205" width="145" height="40" rx="6" fill="#8b5cf6" fill-opacity="0.15"/>
  <rect x="195" y="255" width="145" height="40" rx="6" fill="#8b5cf6" fill-opacity="0.1"/>

  <!-- Floating elements for animation -->
  <circle cx="320" cy="180" r="30" fill="#3b82f6" fill-opacity="0.1"/>
  <circle cx="100" cy="240" r="20" fill="#8b5cf6" fill-opacity="0.15"/>
</svg>
